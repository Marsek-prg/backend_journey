<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#eef3ee">
    <title>Трекер задач</title>
    <link rel="stylesheet" href="/static/style.css?v=20260620">
  </head>
  <body>
    <main class="page">
      <section class="task-card" aria-labelledby="page-title">
        <header class="task-card__header">
          <span class="task-card__eyebrow">Мой список</span>
          <h1 id="page-title">Трекер задач</h1>
          <p>Записывайте важное, отмечайте выполненное и сохраняйте фокус на главном.</p>
        </header>

        <form id="task-form" class="task-form" novalidate>
          <div class="task-form__field">
            <label class="visually-hidden" for="task-title">Название новой задачи</label>
            <input
              id="task-title"
              name="title"
              type="text"
              placeholder="Например, подготовить отчёт"
              autocomplete="off"
              aria-describedby="task-error"
            >
            <p id="task-error" class="form-error" role="alert" aria-live="polite"></p>
          </div>
          <button class="button button--primary" type="submit">Добавить</button>
        </form>

        <section class="task-stats" aria-label="Статистика задач">
          <span>Всего <strong id="stats-total">0</strong></span>
          <span>Активных <strong id="stats-active">0</strong></span>
          <span>Выполненных <strong id="stats-completed">0</strong></span>
        </section>

        <div class="task-controls">
          <div class="task-filters" role="group" aria-label="Фильтр задач">
            <button class="filter-button filter-button--active" type="button" data-status="all">Все</button>
            <button class="filter-button" type="button" data-status="active">Активные</button>
            <button class="filter-button" type="button" data-status="completed">Выполненные</button>
          </div>
          <label class="visually-hidden" for="task-search">Поиск задач</label>
          <input id="task-search" type="search" placeholder="Поиск по задачам" autocomplete="off">
        </div>

        <div class="task-list__heading">
          <h2>Задачи</h2>
          <span id="task-count" class="task-count" aria-live="polite"></span>
        </div>
        <ul id="tasks" class="task-list" aria-live="polite"></ul>
      </section>
    </main>

    <script src="/static/app.js?v=20260620"></script>
  </body>
</html>

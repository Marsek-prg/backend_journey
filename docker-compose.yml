services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      TASK_TRACKER_DATA_DIR: /data
    volumes:
      - tasktracker_data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  tasktracker_data:
    name: tasktracker_data
